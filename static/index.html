<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grocery Agent — bulk order</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         max-width: 640px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
  h1 { font-size: 1.4rem; }
  label { display: block; font-weight: 600; margin: 1rem 0 0.25rem; }
  textarea, input, button { font: inherit; width: 100%; box-sizing: border-box;
         padding: 0.5rem; border-radius: 6px; border: 1px solid #999; }
  textarea { min-height: 10rem; }
  button { margin-top: 1rem; cursor: pointer; font-weight: 600; width: auto;
         padding: 0.5rem 1.5rem; }
  button:disabled { opacity: 0.5; cursor: wait; }
  .hint { color: #777; font-size: 0.85rem; margin-top: 0.25rem; }
  #result { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; display: none;
         border: 1px solid #999; overflow-x: auto; }
  #result.ok { border-color: #2e7d32; }
  #result.err { border-color: #c62828; }
  table { border-collapse: collapse; width: 100%; margin-top: 0.5rem; }
  td, th { text-align: left; padding: 0.2rem 0.75rem 0.2rem 0; }
  .warn { color: #b26a00; }
  .error { color: #c62828; }
</style>
</head>
<body>
<h1>🛒 Grocery Agent — bulk order</h1>
<p class="hint">One item per line. Quantities: <code>2 milk</code>, <code>milk x2</code>, or <code>0.5 ground beef</code> (lb for weight items). Everything gets added to your DoorDash cart.</p>

<label for="items">Items</label>
<textarea id="items" placeholder="2 milk&#10;eggs&#10;bread&#10;bananas x3"></textarea>

<label for="store">Store (optional)</label>
<input id="store" list="stores" placeholder="Leave blank to auto-pick, or type e.g. Whole Foods">
<datalist id="stores"></datalist>
<div class="hint" id="store-hint">Loading nearby stores…</div>

<button id="send">Send order to cart</button>

<div id="result"></div>

<script>
const $ = id => document.getElementById(id);
const storeIds = {};   // "name" -> store_id from /api/stores

fetch('/api/stores').then(r => r.json()).then(data => {
  const stores = data.stores || [];
  $('stores').innerHTML = stores.map(s => `<option value="${s.name}">`).join('');
  stores.forEach(s => storeIds[s.name] = s.store_id);
  $('store-hint').textContent = stores.length
    ? `${stores.length} stores near your default address.`
    : 'Could not load nearby stores — you can still type a store name.';
}).catch(() => $('store-hint').textContent = 'Could not load nearby stores.');

function esc(s) {
  return String(s ?? '').replace(/[&<>"]/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

$('send').onclick = async () => {
  const text = $('items').value.trim();
  const box = $('result');
  if (!text) { alert('Add at least one item.'); return; }

  const body = { text };
  const store = $('store').value.trim();
  if (store && storeIds[store]) body.store_id = String(storeIds[store]);
  else if (store) body.store_name = store;

  $('send').disabled = true;
  box.style.display = 'block';
  box.className = '';
  box.textContent = 'Resolving items and filling your cart… (this can take a minute)';

  try {
    const resp = await fetch('/api/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const r = await resp.json();
    box.className = r.ok ? 'ok' : 'err';
    if (!r.ok) {
      box.innerHTML = `<strong class="error">Order failed:</strong> ${esc(r.error)}`;
      return;
    }
    const rows = (r.resolved || []).map(it =>
      `<tr><td>${esc(it.quantity)}${it.unit ? ' ' + esc(it.unit) : '×'}</td>` +
      `<td>${esc(it.name)}</td><td>${it.price != null ? '$' + esc(it.price) : ''}</td></tr>`
    ).join('');
    const errs = (r.item_errors || []).map(e =>
      `<li class="error">${esc(e.item_name || e.item_id)}: ${esc(e.error_message)}</li>`).join('');
    box.innerHTML =
      `<strong>✅ Added to your ${esc(r.store_name)} cart</strong>` +
      (r.appended_to_existing_cart
        ? ' <span class="warn">(appended to a cart you already had open at this store)</span>' : '') +
      `<table><tr><th>Qty</th><th>Item</th><th>Price</th></tr>${rows}</table>` +
      (r.notes ? `<p class="warn">⚠️ ${esc(r.notes)}</p>` : '') +
      (errs ? `<p class="error">Some items failed:</p><ul>${errs}</ul>` : '') +
      `<p class="hint">Cart: <code>${esc(r.cart_uuid)}</code> · delivering to ${esc(r.delivery_address)}<br>` +
      `Review &amp; check out in the DoorDash app, or run ` +
      `<code>dd-cli order preview --cart-uuid ${esc(r.cart_uuid)}</code>.</p>`;
  } catch (e) {
    box.className = 'err';
    box.textContent = 'Request failed: ' + e;
  } finally {
    $('send').disabled = false;
  }
};
</script>
</body>
</html>
